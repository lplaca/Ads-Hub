services:
  - type: web
    name: meta-ads-control-center
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: meta-ads-db
          property: connectionString

databases:
  - name: meta-ads-db
    databaseName: meta_ads
    user: meta_ads
    plan: free
