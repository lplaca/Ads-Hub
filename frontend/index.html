<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Meta Ads Control Center</title>
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%232563eb'/><path d='M8 22 L12 10 L16 18 L20 10 L24 22' stroke='white' stroke-width='2.5' fill='none' stroke-linecap='round' stroke-linejoin='round'/></svg>" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>

  <!-- Alpine.js -->
  <script defer src="https://cdn.jsdelivr.net/npm/alpinejs@3.14.1/dist/cdn.min.js"></script>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>

  <!-- Font Awesome 6 -->
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />

  <!-- Inter Font -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

  <!-- Custom CSS -->
  <link rel="stylesheet" href="/static/css/styles.css?v=4" />

  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          fontFamily: { sans: ['Inter', 'system-ui', 'sans-serif'] },
          colors: {
            slate: {
              850: '#172033',
              925: '#0d1829',
            }
          }
        }
      }
    }
  </script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans antialiased" style="background: linear-gradient(135deg, #0a1628 0%, #0f172a 40%, #0d1f3c 100%); min-height: 100vh;">

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!--  AUTH GATE                                                                  -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div x-data="AuthGate" x-init="init()">

  <!-- Loading splash -->
  <div x-show="!checked" class="min-h-screen flex items-center justify-center" style="background:#0a1628;">
    <div class="text-center">
      <div class="w-12 h-12 rounded-xl flex items-center justify-center mx-auto mb-3" style="background:linear-gradient(135deg,#2563eb,#3b82f6);">
        <i class="fas fa-chart-line text-white"></i>
      </div>
      <div class="w-6 h-6 border-2 border-blue-500 border-t-transparent rounded-full animate-spin mx-auto"></div>
    </div>
  </div>

  <!-- Login / Setup screen -->
  <div x-show="checked && !authed" x-html="renderLogin()"></div>

  <!-- Main App -->
  <div x-show="checked && authed">

<!-- ══════════════════════════════════════════════════════════════════════════ -->
<!--  MAIN APPLICATION                                                          -->
<!-- ══════════════════════════════════════════════════════════════════════════ -->
<div id="app" x-data="App" class="flex h-screen">

  <!-- ── MOBILE SIDEBAR OVERLAY ─────────────────────────────────────────── -->
  <div
    x-show="sidebarOpen && isMobile"
    x-transition:enter="transition-opacity ease-out duration-300"
    x-transition:enter-start="opacity-0"
    x-transition:enter-end="opacity-100"
    x-transition:leave="transition-opacity ease-in duration-200"
    x-transition:leave-start="opacity-100"
    x-transition:leave-end="opacity-0"
    @click="sidebarOpen = false"
    class="fixed inset-0 z-20 bg-black/60 backdrop-blur-sm lg:hidden"
    style="display: none;"
  ></div>

  <!-- ── SIDEBAR ─────────────────────────────────────────────────────────── -->
  <aside
    :class="[
      sidebarCollapsed ? 'w-[68px]' : 'w-64',
      sidebarOpen || !isMobile ? 'translate-x-0' : '-translate-x-full'
    ]"
    class="fixed lg:relative z-30 flex flex-col h-full transition-all duration-300 ease-in-out"
    style="background: rgba(15,23,42,0.97); backdrop-filter: blur(24px); border-right: 1px solid rgba(51,65,85,0.5);"
  >
    <!-- Logo + Project Switcher -->
    <div x-data="ProjectSwitcher" x-init="init()" class="flex-shrink-0" style="border-bottom: 1px solid rgba(51,65,85,0.4);">
      <!-- Logo row -->
      <div class="flex items-center gap-3 p-4" style="min-height: 64px;">
        <div class="w-9 h-9 rounded-xl flex items-center justify-center flex-shrink-0" style="background: linear-gradient(135deg, #2563eb, #3b82f6); box-shadow: 0 4px 16px rgba(59,130,246,0.4);">
          <i class="fas fa-chart-line text-white text-sm"></i>
        </div>
        <div x-show="!sidebarCollapsed" x-transition:enter="transition-opacity duration-200" x-transition:enter-start="opacity-0" x-transition:enter-end="opacity-100">
          <p class="text-white font-bold text-sm leading-tight whitespace-nowrap">Meta Ads</p>
          <p class="text-blue-400 text-xs font-medium whitespace-nowrap">Control Center</p>
        </div>
      </div>
      <!-- Project picker (only when expanded) -->
      <div x-show="!sidebarCollapsed" class="px-2 pb-2 relative">
        <button @click="open = !open"
          class="w-full flex items-center gap-2 px-3 py-2 rounded-xl text-left transition-all hover:bg-slate-800/60 border border-transparent hover:border-slate-700/50"
          :style="open ? 'background:rgba(30,41,59,0.8);border-color:rgba(51,65,85,0.5)' : ''">
          <span class="w-5 h-5 rounded-md flex-shrink-0" :style="'background:' + (active?.color || '#64748b')"></span>
          <span class="text-sm text-slate-200 font-medium flex-1 truncate" x-text="active?.name || 'Todos'"></span>
          <i :class="open ? 'fas fa-chevron-up' : 'fas fa-chevron-down'" class="text-xs text-slate-500"></i>
        </button>
        <!-- Dropdown -->
        <div x-show="open" @click.outside="open=false" x-transition
          class="absolute left-2 right-2 top-full mt-1 rounded-xl shadow-2xl z-50 overflow-hidden"
          style="background:#1e293b; border:1px solid rgba(51,65,85,0.6);">
          <template x-for="p in projects" :key="p.id">
            <div class="flex items-center gap-2 px-3 py-2 hover:bg-slate-700/50 transition-colors cursor-pointer group"
              @click="activate(p.id)">
              <span class="w-4 h-4 rounded flex-shrink-0" :style="'background:'+p.color"></span>
              <span class="text-sm text-slate-200 flex-1 truncate" x-text="p.name"></span>
              <i x-show="p.is_active" class="fas fa-check text-xs text-blue-400"></i>
              <button @click.stop="openEdit(p)" class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-white transition-all text-xs ml-1"><i class="fas fa-pen"></i></button>
              <button @click.stop="remove(p.id)" class="opacity-0 group-hover:opacity-100 text-slate-500 hover:text-red-400 transition-all text-xs"><i class="fas fa-trash"></i></button>
            </div>
          </template>
          <div class="border-t" style="border-color:rgba(51,65,85,0.4);">
            <button @click="openCreate(); open=false"
              class="w-full flex items-center gap-2 px-3 py-2 text-sm text-blue-400 hover:bg-slate-700/30 transition-colors">
              <i class="fas fa-plus text-xs"></i> Novo projeto
            </button>
          </div>
        </div>
      </div>

      <!-- Project Modal -->
      <div x-show="showModal" x-transition class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.75); display:none;">
        <div class="w-full max-w-sm rounded-2xl overflow-hidden" style="background:#1e293b; border:1px solid rgba(51,65,85,0.6); max-height:90vh; overflow-y:auto;" @click.stop>
          <!-- Header -->
          <div class="flex items-center justify-between p-5 pb-0">
            <h3 class="font-bold text-white" x-text="editId ? 'Editar Projeto' : 'Novo Projeto'"></h3>
            <button @click="showModal=false" class="text-slate-500 hover:text-white transition-colors"><i class="fas fa-times"></i></button>
          </div>
          <div class="p-5 space-y-4">
            <!-- Name -->
            <div>
              <label class="text-xs text-slate-400 block mb-1">Nome do projeto</label>
              <input x-model="form.name" type="text" placeholder="Ex: GTS, Hot, Ondelta..." @keydown.enter="save()"
                class="w-full px-3 py-2 rounded-xl text-sm text-white bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none" />
            </div>
            <!-- Color -->
            <div>
              <label class="text-xs text-slate-400 block mb-2">Cor</label>
              <div class="flex gap-2 flex-wrap">
                <template x-for="c in COLORS" :key="c">
                  <button @click="form.color=c" class="w-7 h-7 rounded-lg transition-all" :style="'background:'+c+(form.color===c?';outline:2px solid white;outline-offset:2px':'')" ></button>
                </template>
              </div>
            </div>
            <!-- Integrations toggle -->
            <button @click="showIntegrations=!showIntegrations" class="w-full flex items-center justify-between px-3 py-2 rounded-xl text-sm text-slate-400 transition-colors" style="background:rgba(51,65,85,0.4); border:1px solid rgba(51,65,85,0.5);">
              <span class="flex items-center gap-2"><i class="fas fa-plug text-xs"></i> Integrações (Notion / ClickUp)</span>
              <i class="fas text-xs transition-transform" :class="showIntegrations ? 'fa-chevron-up' : 'fa-chevron-down'"></i>
            </button>
            <!-- Integrations fields -->
            <div x-show="showIntegrations" x-transition class="space-y-3 pt-1">
              <p class="text-xs text-slate-500">Configure para sincronizar análises diárias deste projeto.</p>
              <!-- Notion -->
              <div class="rounded-xl p-3 space-y-2" style="background:rgba(30,41,59,0.8); border:1px solid rgba(51,65,85,0.4);">
                <p class="text-xs font-semibold text-slate-300 flex items-center gap-1.5"><i class="fas fa-book text-purple-400"></i> Notion</p>
                <div>
                  <label class="text-xs text-slate-500 block mb-1">Token de integração</label>
                  <input x-model="integrations.notion_token" type="password" placeholder="secret_..."
                    class="w-full px-3 py-2 rounded-lg text-xs text-white bg-slate-800 border border-slate-700 focus:border-purple-500 focus:outline-none" />
                </div>
                <div>
                  <label class="text-xs text-slate-500 block mb-1">ID — Análises Diárias (banco de dados)</label>
                  <input x-model="integrations.notion_analyses_db_id" type="text" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                    class="w-full px-3 py-2 rounded-lg text-xs text-white bg-slate-800 border border-slate-700 focus:border-purple-500 focus:outline-none" />
                </div>
                <div>
                  <label class="text-xs text-slate-500 block mb-1">ID — Produtos (banco de dados, opcional)</label>
                  <input x-model="integrations.notion_products_db_id" type="text" placeholder="xxxxxxxxxxxxxxxxxxxxxxxxxxxxxxxx"
                    class="w-full px-3 py-2 rounded-lg text-xs text-white bg-slate-800 border border-slate-700 focus:border-purple-500 focus:outline-none" />
                </div>
              </div>
              <!-- ClickUp -->
              <div class="rounded-xl p-3 space-y-2" style="background:rgba(30,41,59,0.8); border:1px solid rgba(51,65,85,0.4);">
                <p class="text-xs font-semibold text-slate-300 flex items-center gap-1.5"><i class="fas fa-check-circle text-pink-400"></i> ClickUp</p>
                <div>
                  <label class="text-xs text-slate-500 block mb-1">API Token</label>
                  <input x-model="integrations.clickup_token" type="password" placeholder="pk_..."
                    class="w-full px-3 py-2 rounded-lg text-xs text-white bg-slate-800 border border-slate-700 focus:border-pink-500 focus:outline-none" />
                </div>
                <div>
                  <label class="text-xs text-slate-500 block mb-1">List ID</label>
                  <input x-model="integrations.clickup_list_id" type="text" placeholder="123456789"
                    class="w-full px-3 py-2 rounded-lg text-xs text-white bg-slate-800 border border-slate-700 focus:border-pink-500 focus:outline-none" />
                </div>
              </div>
            </div>
            <!-- Error feedback -->
            <div x-show="saveError" class="px-3 py-2 rounded-xl text-xs text-red-300 flex items-center gap-2" style="background:rgba(239,68,68,0.1);border:1px solid rgba(239,68,68,0.3);display:none;">
              <i class="fas fa-triangle-exclamation flex-shrink-0"></i>
              <span x-text="saveError"></span>
            </div>
            <!-- Actions -->
            <div class="flex gap-2 pt-1">
              <button @click="showModal=false; saveError=''" class="flex-1 py-2 rounded-xl text-sm text-slate-400 border border-slate-700 hover:border-slate-500">Cancelar</button>
              <button @click="save()" :disabled="saving" class="flex-1 py-2 rounded-xl text-sm font-semibold text-white disabled:opacity-50" style="background:#2563eb;">
                <i x-show="saving" class="fas fa-spinner animate-spin mr-1"></i>
                <span x-text="saving ? 'Salvando...' : 'Salvar'"></span>
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- Nav Items -->
    <nav class="flex-1 p-2 overflow-y-auto overflow-x-hidden mt-1">
      <!-- Group: main -->
      <div x-show="!sidebarCollapsed" class="px-2 py-1.5 mt-1 mb-0.5">
        <p class="text-slate-600 text-xs font-semibold uppercase tracking-widest">Visão Geral</p>
      </div>
      <template x-for="item in navItems.filter(n=>n.group==='main')" :key="item.id">
        <button
          @click="navigate(item.id)"
          :class="currentPage === item.id
            ? 'bg-blue-600/20 text-blue-400 border-blue-500/30'
            : 'text-slate-500 hover:bg-slate-800/60 hover:text-slate-300 border-transparent'"
          class="sidebar-item relative group"
          :title="sidebarCollapsed ? item.label : ''"
        >
          <i :class="item.icon + ' icon text-base'" style="min-width:18px;"></i>
          <span x-show="!sidebarCollapsed" class="text-sm font-medium whitespace-nowrap transition-all" x-text="item.label"></span>
        </button>
      </template>

      <!-- Group: AI -->
      <div x-show="!sidebarCollapsed" class="px-2 py-1.5 mt-3 mb-0.5">
        <p class="text-xs font-semibold uppercase tracking-widest" style="color:#3b82f6aa;">Gestor IA</p>
      </div>
      <div x-show="sidebarCollapsed" class="my-1.5 mx-2 border-t border-slate-700/50"></div>
      <template x-for="item in navItems.filter(n=>n.group==='ai')" :key="item.id">
        <button
          @click="navigate(item.id)"
          :class="currentPage === item.id
            ? 'bg-blue-600/20 text-blue-400 border-blue-500/30'
            : 'text-slate-500 hover:bg-slate-800/60 hover:text-slate-300 border-transparent'"
          class="sidebar-item relative group"
          :title="sidebarCollapsed ? item.label : ''"
        >
          <i :class="item.icon + ' icon text-base'" style="min-width:18px;"></i>
          <span x-show="!sidebarCollapsed" class="text-sm font-medium whitespace-nowrap transition-all flex-1" x-text="item.label"></span>
          <span x-show="item.badge && !sidebarCollapsed" class="text-xs font-bold px-1.5 py-0.5 rounded-md ml-auto" style="background:rgba(59,130,246,0.2);color:#60a5fa;font-size:9px;" x-text="item.badge"></span>
        </button>
      </template>

      <!-- Group: management -->
      <div x-show="!sidebarCollapsed" class="px-2 py-1.5 mt-3 mb-0.5">
        <p class="text-slate-600 text-xs font-semibold uppercase tracking-widest">Gestão</p>
      </div>
      <div x-show="sidebarCollapsed" class="my-1.5 mx-2 border-t border-slate-700/50"></div>
      <template x-for="item in navItems.filter(n=>n.group==='management' && n.id!=='account-detail')" :key="item.id">
        <button
          @click="navigate(item.id)"
          :class="currentPage === item.id
            ? 'bg-blue-600/20 text-blue-400 border-blue-500/30'
            : 'text-slate-500 hover:bg-slate-800/60 hover:text-slate-300 border-transparent'"
          class="sidebar-item relative group"
          :title="sidebarCollapsed ? item.label : ''"
        >
          <i :class="item.icon + ' icon text-base'" style="min-width:18px;"></i>
          <span x-show="!sidebarCollapsed" class="text-sm font-medium whitespace-nowrap transition-all" x-text="item.label"></span>
          <!-- Alert badge (expanded) -->
          <span
            x-show="item.id === 'alerts' && alertCount > 0 && !sidebarCollapsed"
            x-text="alertCount"
            class="ml-auto text-xs font-bold bg-red-500 text-white rounded-full flex items-center justify-center"
            style="min-width:20px; height:20px; padding:0 4px;"
          ></span>
          <!-- Alert dot (collapsed) -->
          <span
            x-show="item.id === 'alerts' && alertCount > 0 && sidebarCollapsed"
            class="absolute top-1.5 right-1.5 w-2 h-2 bg-red-500 rounded-full pulse-dot"
          ></span>
        </button>
      </template>
    </nav>

    <!-- Divider + Collapse button (desktop) -->
    <div style="border-top: 1px solid rgba(51,65,85,0.4);">
      <button
        @click="sidebarCollapsed = !sidebarCollapsed"
        class="hidden lg:flex w-full items-center justify-center p-3 text-slate-500 hover:text-slate-300 transition-colors"
        :title="sidebarCollapsed ? 'Expandir sidebar' : 'Colapsar sidebar'"
      >
        <i :class="sidebarCollapsed ? 'fas fa-chevron-right' : 'fas fa-chevron-left'" class="text-xs"></i>
      </button>
    </div>
  </aside>

  <!-- ── MAIN AREA ────────────────────────────────────────────────────────── -->
  <div class="flex-1 flex flex-col min-w-0 overflow-x-hidden">

    <!-- ── HEADER ───────────────────────────────────────────────────────── -->
    <header class="flex-shrink-0 px-4 py-3" style="position:sticky;top:0;z-index:50;background:rgba(15,23,42,0.9);backdrop-filter:blur(16px);border-bottom:1px solid rgba(51,65,85,0.4);min-height:64px;">
      <div class="flex items-center justify-between h-full">
        <!-- Left: Menu + Title -->
        <div class="flex items-center gap-3">
          <button @click="sidebarOpen = !sidebarOpen" class="lg:hidden p-2 text-slate-400 hover:text-white hover:bg-slate-800/60 rounded-lg transition-all">
            <i class="fas fa-bars text-lg"></i>
          </button>
          <div>
            <h1 class="text-white font-semibold text-base leading-tight" x-text="pageTitle"></h1>
            <p class="text-slate-400 text-xs" x-text="pageSubtitle"></p>
          </div>
        </div>

        <!-- Right: Actions -->
        <div class="flex items-center gap-2">
          <!-- No accounts badge -->
          <div x-show="$store.meta.accountCount === 0" class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-lg text-xs font-semibold cursor-pointer" style="background: rgba(59,130,246,0.1); border: 1px solid rgba(59,130,246,0.3); color: #60a5fa;" @click="$dispatch('navigate',{page:'connections'})">
            <i class="fas fa-plug text-xs"></i>
            <span>Conectar API</span>
          </div>

          <!-- Live indicator -->
          <div x-show="$store.meta.accountCount > 0" class="hidden sm:flex items-center gap-1.5 px-2.5 py-1 rounded-lg" style="background:rgba(34,197,94,0.06);border:1px solid rgba(34,197,94,0.2);">
            <span class="w-2 h-2 rounded-full bg-green-500 flex-shrink-0" :class="livePulse ? 'animate-ping' : 'animate-pulse'" style="animation-duration:2s;"></span>
            <span class="text-xs font-medium text-green-400">LIVE</span>
            <span x-show="liveTimestamp" class="text-xs text-slate-500 font-mono" x-text="liveTimestamp"></span>
          </div>

          <!-- Refresh -->
          <button @click="refreshData(); pollLive()" :class="loading ? 'animate-spin' : ''" class="p-2 text-slate-400 hover:text-white hover:bg-slate-800/60 rounded-lg transition-all">
            <i class="fas fa-rotate-right text-sm"></i>
          </button>

          <!-- Notifications -->
          <div class="relative">
            <button @click="notifOpen = !notifOpen" class="relative p-2 text-slate-400 hover:text-white hover:bg-slate-800/60 rounded-lg transition-all">
              <i class="fas fa-bell text-lg"></i>
              <span x-show="toastQueue.length > 0" x-text="toastQueue.length" class="absolute -top-0.5 -right-0.5 bg-red-500 text-white text-xs font-bold rounded-full flex items-center justify-center" style="min-width:18px; height:18px; padding:0 3px;"></span>
            </button>

            <!-- Notification Panel -->
            <div
              x-show="notifOpen"
              @click.outside="notifOpen = false"
              x-transition:enter="transition ease-out duration-200"
              x-transition:enter-start="opacity-0 scale-95"
              x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-150"
              x-transition:leave-start="opacity-100 scale-100"
              x-transition:leave-end="opacity-0 scale-95"
              class="absolute right-0 top-full mt-2 w-80 rounded-2xl shadow-2xl z-50"
              style="background:#1e293b; border:1px solid rgba(51,65,85,0.8); display:none; origin: top right;"
            >
              <div class="flex items-center justify-between p-3 border-b" style="border-color:rgba(51,65,85,0.5);">
                <h3 class="font-semibold text-white text-sm">Notificações</h3>
                <button @click="notifLog = []; notifOpen = false" class="text-xs text-slate-400 hover:text-white transition-colors">Limpar</button>
              </div>
              <div class="max-h-72 overflow-y-auto">
                <template x-if="notifLog.length === 0">
                  <div class="p-6 text-center">
                    <i class="fas fa-bell-slash text-slate-600 text-2xl mb-2"></i>
                    <p class="text-slate-500 text-sm">Nenhuma notificação</p>
                  </div>
                </template>
                <template x-for="n in notifLog.slice().reverse()" :key="n.id">
                  <div class="flex items-start gap-3 p-3 hover:bg-slate-700/30 transition-colors border-b" style="border-color:rgba(51,65,85,0.3);">
                    <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0 mt-0.5" :style="'background:' + n.bg">
                      <i :class="n.icon + ' text-xs'" :style="'color:' + n.color"></i>
                    </div>
                    <div class="flex-1 min-w-0">
                      <p class="text-sm text-slate-200 leading-snug" x-text="n.message"></p>
                      <p class="text-xs text-slate-500 mt-0.5" x-text="n.time"></p>
                    </div>
                  </div>
                </template>
              </div>
            </div>
          </div>

          <!-- User Menu -->
          <div x-data="UserMenu" x-init="init()" class="relative">
            <button @click="open = !open"
              class="w-8 h-8 rounded-full flex items-center justify-center text-white text-sm font-bold transition-all hover:ring-2 hover:ring-blue-500/50"
              style="background: linear-gradient(135deg, #2563eb, #7c3aed);"
              x-text="initials()"></button>

            <!-- Dropdown -->
            <div x-show="open" @click.outside="open=false"
              x-transition:enter="transition ease-out duration-150" x-transition:enter-start="opacity-0 scale-95" x-transition:enter-end="opacity-100 scale-100"
              x-transition:leave="transition ease-in duration-100" x-transition:leave-start="opacity-100 scale-100" x-transition:leave-end="opacity-0 scale-95"
              class="absolute right-0 top-full mt-2 w-56 rounded-2xl shadow-2xl z-50"
              style="background:#1e293b; border:1px solid rgba(51,65,85,0.7); display:none; origin: top right;">
              <div class="p-3 border-b" style="border-color:rgba(51,65,85,0.5);">
                <p class="text-white text-sm font-semibold truncate" x-text="user?.name || 'Usuário'"></p>
                <p class="text-slate-400 text-xs truncate" x-text="user?.email || ''"></p>
              </div>
              <div class="p-1">
                <button @click="showProfile=true; open=false" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm text-slate-300 hover:bg-slate-700/50 hover:text-white transition-colors">
                  <i class="fas fa-user-pen w-4 text-slate-400"></i> Editar perfil
                </button>
                <button @click="$dispatch('navigate',{page:'settings'}); open=false" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm text-slate-300 hover:bg-slate-700/50 hover:text-white transition-colors">
                  <i class="fas fa-gear w-4 text-slate-400"></i> Configurações
                </button>
                <div class="border-t my-1" style="border-color:rgba(51,65,85,0.4);"></div>
                <button @click="logout()" class="w-full flex items-center gap-2.5 px-3 py-2 rounded-xl text-sm text-red-400 hover:bg-red-500/10 transition-colors">
                  <i class="fas fa-arrow-right-from-bracket w-4"></i> Sair
                </button>
              </div>
            </div>

            <!-- Edit Profile Modal -->
            <div x-show="showProfile" x-transition class="fixed inset-0 z-[200] flex items-center justify-center p-4" style="background:rgba(0,0,0,0.7); display:none;">
              <div class="w-full max-w-sm rounded-2xl p-5 space-y-4" style="background:#1e293b; border:1px solid rgba(51,65,85,0.6);" @click.stop>
                <h3 class="font-bold text-white">Editar Perfil</h3>
                <div>
                  <label class="text-xs text-slate-400 block mb-1">Nome</label>
                  <input x-model="form.name" type="text" class="w-full px-3 py-2 rounded-xl text-sm text-white bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none" />
                </div>
                <div>
                  <label class="text-xs text-slate-400 block mb-1">Email</label>
                  <input x-model="form.email" type="email" class="w-full px-3 py-2 rounded-xl text-sm text-white bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none" />
                </div>
                <div class="border-t pt-3" style="border-color:rgba(51,65,85,0.4);">
                  <p class="text-xs text-slate-500 mb-2">Alterar senha (opcional)</p>
                  <input x-model="form.current_password" type="password" placeholder="Senha atual" class="w-full px-3 py-2 rounded-xl text-sm text-white bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none mb-2" />
                  <input x-model="form.new_password" type="password" placeholder="Nova senha" class="w-full px-3 py-2 rounded-xl text-sm text-white bg-slate-800 border border-slate-700 focus:border-blue-500 focus:outline-none" />
                </div>
                <div class="flex gap-2 pt-1">
                  <button @click="showProfile=false; form.current_password=''; form.new_password=''" class="flex-1 py-2 rounded-xl text-sm text-slate-400 border border-slate-700 hover:border-slate-500">Cancelar</button>
                  <button @click="saveProfile()" :disabled="saving" class="flex-1 py-2 rounded-xl text-sm font-semibold text-white disabled:opacity-50" style="background:#2563eb;">
                    <span x-text="saving ? 'Salvando...' : 'Salvar'"></span>
                  </button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </div>
    </header>

    <!-- ── PAGE CONTENT ──────────────────────────────────────────────────── -->
    <main class="flex-1 overflow-y-auto" style="background: transparent;">
      <div class="p-4 lg:p-6 max-w-[1600px] mx-auto">

        <!-- DASHBOARD -->
        <div x-show="currentPage === 'dashboard'" x-data="Dashboard" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- BUSINESS MANAGERS -->
        <div x-show="currentPage === 'bm'" x-data="BmPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- ACCOUNTS -->
        <div x-show="currentPage === 'accounts'" x-data="AccountsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- PRODUCTS -->
        <div x-show="currentPage === 'products'" x-data="ProductsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- RULES -->
        <div x-show="currentPage === 'rules'" x-data="RulesPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- ALERTS -->
        <div x-show="currentPage === 'alerts'" x-data="AlertsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- QUICK ACTIONS -->
        <div x-show="currentPage === 'quickactions'" x-data="QuickActionsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- REPORTS -->
        <div x-show="currentPage === 'reports'" x-data="ReportsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- SETTINGS -->
        <div x-show="currentPage === 'settings'" x-data="SettingsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- ── GESTOR IA PAGES ──────────────────────────────────────────────── -->

        <!-- CAMPAIGNS (detailed) -->
        <div x-show="currentPage === 'campaigns'" x-data="CampaignsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- AI AGENT -->
        <div x-show="currentPage === 'agent'" x-data="AgentPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- KNOWLEDGE BASE -->
        <div x-show="currentPage === 'knowledge'" x-data="KnowledgePage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- CHAT -->
        <div x-show="currentPage === 'chat'" x-data="ChatPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- IDEAS -->
        <div x-show="currentPage === 'ideas'" x-data="IdeasPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- DEEP ANALYSIS -->
        <div x-show="currentPage === 'analysis'" x-data="AnalysisPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- IMPORTAR — Google Sheets Sync + Campaign Launcher -->
        <div x-show="currentPage === 'importar'" x-data="ImportarPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- MANUAL — Guia Completo da Plataforma -->
        <div x-show="currentPage === 'manual'" x-data="ManualPage" class="h-full">
          <div x-html="renderPage()"></div>
        </div>

        <!-- API CONNECTIONS -->
        <div x-show="currentPage === 'connections'" x-data="ConnectionsPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- INTEL — Market Intelligence Web Research -->
        <div x-show="currentPage === 'intel'" x-data="IntelPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- SYNC — Work Session + ClickUp/Notion -->
        <div x-show="currentPage === 'sync'" x-data="SyncPage" x-init="init()">
          <div x-html="renderPage()"></div>
        </div>

        <!-- ACCOUNT DETAIL -->
        <div x-show="currentPage === 'account-detail'" x-data="AccountDetailPage"
             @navigate.window="$event.detail?.page==='account-detail' && onNav()">
          <div x-html="renderPage()"></div>
        </div>

      </div><!-- /max-w -->
    </main><!-- /main -->
  </div><!-- /main area -->

  <!-- ══ MODALS LAYER ════════════════════════════════════════════════════ -->
  <!-- Modals are rendered by each page component via Alpine magic -->

  <!-- ══ TOAST NOTIFICATIONS ═════════════════════════════════════════════ -->
  <div class="fixed top-4 right-4 z-[200] flex flex-col gap-2 pointer-events-none" style="max-width:360px;">
    <template x-for="toast in toasts" :key="toast.id">
      <div
        x-show="toast.visible"
        x-transition:enter="transition ease-out duration-300 transform"
        x-transition:enter-start="translate-x-full opacity-0"
        x-transition:enter-end="translate-x-0 opacity-100"
        x-transition:leave="transition ease-in duration-200 transform"
        x-transition:leave-start="translate-x-0 opacity-100"
        x-transition:leave-end="translate-x-full opacity-0"
        class="flex items-center gap-3 px-4 py-3 rounded-xl shadow-2xl pointer-events-auto"
        :style="toast.style"
      >
        <div class="w-7 h-7 rounded-full flex items-center justify-center flex-shrink-0" :style="toast.iconBg">
          <i :class="toast.icon + ' text-xs'" :style="'color:' + toast.iconColor"></i>
        </div>
        <p class="text-sm font-medium text-white flex-1 leading-snug" x-text="toast.message"></p>
        <button @click="removeToast(toast.id)" class="text-white/50 hover:text-white transition-colors flex-shrink-0 pointer-events-auto" style="min-width:20px;">
          <i class="fas fa-times text-xs"></i>
        </button>
      </div>
    </template>
  </div>

</div><!-- /app -->

  </div><!-- /main app (authed) -->
</div><!-- /AuthGate -->
